version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: novahire_db
    environment:
      POSTGRES_DB: novahire_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - novahire_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  novahire_pgdata:
