spring:
  application:
    name: novahire-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:novahire_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /api
    multipart:
      max-file-size: 3MB
      max-request-size: 3MB

novahire:
  jwt:
    secret: ${JWT_SECRET:novahire-super-secret-key-change-this-in-production-min-256-bits}
    expiration: 86400000   # 24 hours in ms
    refresh-expiration: 604800000  # 7 days in ms

  ai:
    provider: ${AI_PROVIDER:gemini}   # gemini | static  — switch without code changes
    fallback-to-static: true          # if AI fails or key missing → static questions
    prompt:
      version: v1
    gemini:
      api-key: ${GEMINI_API_KEY:}     # set env var GEMINI_API_KEY; blank = auto-fallback to static
      model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
      temperature: 0.7
      max-tokens: 2048
      timeout-seconds: 30

logging:
  level:
    com.novahire: DEBUG
    org.springframework.security: INFO
