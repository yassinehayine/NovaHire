spring:
  application:
    name: novahire-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/novahire_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /api

novahire:
  jwt:
    secret: ${JWT_SECRET:novahire-super-secret-key-change-this-in-production-min-256-bits}
    expiration: 86400000   # 24 hours in ms
    refresh-expiration: 604800000  # 7 days in ms

logging:
  level:
    com.novahire: DEBUG
    org.springframework.security: INFO
